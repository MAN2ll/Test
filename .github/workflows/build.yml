name: Build & Release APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/refs/tags/v8.10.2/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/SecureVault.apk
      - name: Delete old release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Secure Vault — скачать APK"
          body: |
            ## ⬇️ Нажмите на SecureVault.apk ниже чтобы скачать

            **Требования:** Android 8.0+
            **Безопасность:** AES-256-GCM · Android Keystore · PBKDF2-SHA256
            **Функции:** Профили · Планировщик смены · Умный генератор · Экспорт CSV · Подсказки
          files: app/build/outputs/apk/debug/SecureVault.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
